<!DOCTYPE html>
<html>
<head>
<title>Sky AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background-color: #0f172a; 
    background-image: 
      linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
    background-size: 20px 20px; 
    display: flex; 
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #cbd5e1; 
  }

  .main-layout { 
    display: grid;
    grid-template-columns: 250px 1fr; 
    width: 90vw;
    max-width: 1200px;
    height: 85vh;
    background: #1a202c; 
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    border: 1px solid #334155;
  }

  .history-sidebar {
    background-color: #1e293b; 
    color: #cbd5e1; 
    padding: 16px;
    border-right: 1px solid #334155;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  .history-sidebar h3 {
    margin-top: 0;
    margin-bottom: 15px;
    color: white;
    font-size: 1rem;
    text-align: center;
  }

  #history-list {
    flex-grow: 1; 
  }

  .chat-container {
    background: white;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(to right, #1e293b 0%, #334155 100%); 
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .system-status {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid rgba(74, 222, 128, 0.3);
  }

  header h2 {
    color: white; 
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }

  .history-item {
    padding: 8px 10px;
    margin-bottom: 8px;
    background-color: #334155;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background-color 0.2s, border 0.2s;
    border: 1px solid transparent; 
  }

  .history-item:hover {
    background-color: #475569;
  }

  .history-item.active {
    background-color: #475569;
    border: 1px solid #64748b; 
  }

  #clear-history {
    width: 100%;
    padding: 8px;
    margin-top: 15px;
    background-color: #dc2626; 
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  #clear-history:hover {
    background-color: #b91c1c;
  }

  #chat {
    flex-grow: 1;
    padding: 24px;
    overflow-y: auto;
    background-color: #fdfdfd; 
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: #d1d5db transparent;
  }

  .input-area {
    padding: 20px;
    background: #ffffff;
    border-top: 1px solid #e5e7eb;
    display: flex; 
    gap: 12px;
    align-items: center;
  }

  #message {
    flex-grow: 1;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 24px;
    outline: none;
    font-size: 0.95rem; 
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  }

  #message:focus {
    border-color: #6a11cb; 
    box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.2); 
  }

  button {
    padding: 10px 24px;
    background-color: #6a11cb; 
    color: white;
    border: none;
    border-radius: 24px; 
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.2s;
  }

  button:hover {
    background-color: #1d4ed8;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); 
  }

  .message-wrapper {
    display: flex;
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .user-message {
    background-color: #2575fc; 
    color: white;
    padding: 12px 16px;
    border-radius: 18px 18px 4px 18px;
    margin-left: auto;
    max-width: 70%;
    word-wrap: break-word;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15); 
  }

  .ai-message {
    background-color: #f0f4f8; 
    color: #333; 
    padding: 12px 16px;
    border-radius: 18px 18px 18px 4px;
    margin-right: auto;
    max-width: 75%;
    word-wrap: break-word;
    border: 1px solid #e0e7ff; 
  }

  .typing-indicator {
    background-color: #e0e0e0; 
    color: #555;
    display: flex;
    align-items: center;
    gap: 4px;
    width: fit-content; 
    padding: 12px 16px; 
    border-radius: 18px 18px 18px 4px; 
    margin-right: auto; 
    box-shadow: none; 
    border: 1px solid #d1d5db; 
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    background-color: #888;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
  }

  .typing-indicator span:nth-child(1) {
    animation-delay: -0.32s;
  }

  .typing-indicator span:nth-child(2) {
    animation-delay: -0.16s;
  }

  @keyframes bounce {
    0%, 80%, 100% {
      transform: scale(0);
      opacity: 0.7;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }

  /* ========================================= */
  /* 📱 MOBILE RESPONSIVE CSS (নতুন যোগ করা হয়েছে) */
  /* ========================================= */
  @media (max-width: 768px) {
    body {
      align-items: flex-start; /* মোবাইল স্ক্রিনের একদম ওপর থেকে শুরু হবে */
    }
    
    .main-layout {
      grid-template-columns: 1fr; /* পাশাপাশি কলামের বদলে একটি কলাম হবে */
      grid-template-rows: auto 1fr; /* সাইডবার উপরে, চ্যাট নিচে */
      width: 100vw; /* স্ক্রিনের পুরো চওড়া জায়গা নেবে */
      height: 100vh; /* স্ক্রিনের পুরো লম্বা জায়গা নেবে */
      border-radius: 0; /* চারপাশের গোলাকার বর্ডার বাদ দেওয়া হয়েছে */
      border: none;
    }

    .history-sidebar {
      border-right: none;
      border-bottom: 1px solid #334155;
      max-height: 140px; /* সাইডবারটি মোবাইলে ছোট হয়ে উপরের দিকে থাকবে */
      padding: 10px;
    }
    
    .history-sidebar h3 {
      margin-bottom: 8px;
    }

    .user-message, .ai-message {
      max-width: 85%; /* মেসেজের বক্সগুলো মোবাইলে একটু বড় দেখাবে */
    }

    .input-area {
      padding: 12px; /* টাইপ করার জায়গাটা মোবাইলের মাপে ছোট করা হয়েছে */
    }

    button {
      padding: 10px 16px; /* বাটন সাইজ ঠিক করা হয়েছে */
    }
  }
</style>
</head>

<body>

<div class="main-layout">
  <div class="history-sidebar">
    <h3>Conversation History</h3>
    <div id="history-list">
      </div>
    <button id="clear-history">Clear History</button>
  </div>

  <div class="chat-container">

    <header>
      <h2>Sky AI</h2>
      <div class="system-status" id="status-tag">SYSTEM READY</div>
    </header>

    <div id="chat">
    </div>

    <div class="input-area">
      <input id="message" placeholder="Ask something...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
