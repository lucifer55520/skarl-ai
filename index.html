<!DOCTYPE html>
<html>
<head>
<title>Skarl AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  /* একদম পারফেক্ট ফিটিংয়ের জন্য বেসিক রিসেট */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #0f172a; 
    background-image: 
      linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
    background-size: 20px 20px; 
    display: flex; 
    justify-content: center;
    align-items: center;
    height: 100dvh; /* 100vh এর বদলে 100dvh ব্যবহার করা হয়েছে যাতে নিচে না নেমে যায় */
    overflow: hidden; /* বডির স্ক্রলিং পুরোপুরি বন্ধ করা হলো */
    color: #cbd5e1; 
  }

  .main-layout { 
    display: grid;
    grid-template-columns: 250px 1fr; 
    width: 90vw;
    max-width: 1200px;
    height: 85vh;
    background: #1a202c; 
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    border: 1px solid #334155;
  }

  .history-sidebar {
    background-color: #1e293b; 
    color: #cbd5e1; 
    padding: 16px;
    border-right: 1px solid #334155;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .sidebar-header h3 {
    margin: 0;
    color: white;
    font-size: 1rem;
  }

  #history-list {
    flex-grow: 1; 
  }

  .chat-container {
    background: #ffffff; 
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative; 
    width: 100%;
    height: 100%;
  }

  header {
    padding: 16px;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(to right, #1e293b 0%, #334155 100%); 
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10; 
  }

  .menu-btn, .close-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
  }

  .close-btn {
    font-size: 1.2rem;
    color: #cbd5e1;
  }

  .system-status {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid rgba(74, 222, 128, 0.3);
  }

  header h2 {
    color: white; 
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }

  /* Watermark CSS - লোগোর ব্যাকগ্রাউন্ড মুছে ফেলার ম্যাজিক আপডেট করা হলো */
  .chat-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0; 
    pointer-events: none; 
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  .chat-watermark img {
    width: 350px; 
    /* color-burn এবং multiply একত্রে ব্যাকগ্রাউন্ডকে জাদুর মতো মুছে দেবে */
    mix-blend-mode: darken; 
    filter: grayscale(100%) contrast(1.5); 
    opacity: 0.12; 
  }

  #chat {
    flex-grow: 1;
    padding: 24px;
    overflow-y: auto;
    background-color: transparent; 
    position: relative;
    z-index: 1; 
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: #d1d5db transparent;
  }

  .input-area {
    padding: 16px 20px;
    background: #ffffff;
    border-top: 1px solid #e5e7eb;
    display: flex; 
    gap: 12px;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  #message {
    flex-grow: 1;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 24px;
    outline: none;
    font-size: 0.95rem; 
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  }

  #message:focus {
    border-color: #6a11cb; 
    box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.2); 
  }

  button.send-btn {
    padding: 10px 24px;
    background-color: #6a11cb; 
    color: white;
    border: none;
    border-radius: 24px; 
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.2s;
  }

  button.send-btn:hover {
    background-color: #1d4ed8;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); 
  }

  /* মেসেজ ডিজাইন */
  .message-wrapper {
    display: flex;
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .user-message {
    background-color: #2575fc; 
    color: white;
    padding: 12px 16px;
    border-radius: 18px 18px 4px 18px;
    margin-left: auto;
    max-width: 75%;
    word-wrap: break-word;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15); 
  }

  .ai-message {
    background-color: #f0f4f8; 
    color: #333; 
    padding: 12px 16px;
    border-radius: 18px 18px 18px 4px;
    margin-right: auto;
    max-width: 80%;
    word-wrap: break-word;
    border: 1px solid #e0e7ff; 
  }

  @media (max-width: 768px) {
    body {
      align-items: flex-start; 
    }
    
    .main-layout {
      display: flex; 
      width: 100%; /* 100vw এর বদলে 100% দেওয়া হলো দাগ দূর করার জন্য */
      height: 100dvh; /* স্ক্রিন নিচে চলে যাওয়া আটকাবে */
      border-radius: 0; 
      border: none;
      position: relative;
    }

    .history-sidebar {
      position: absolute;
      left: -280px; 
      top: 0;
      height: 100%;
      width: 260px;
      z-index: 1000; 
      transition: left 0.3s ease; 
      box-shadow: 4px 0 15px rgba(0,0,0,0.5);
      border-right: none;
    }

    .history-sidebar.open {
      left: 0; 
    }

    header {
      justify-content: flex-start; 
      gap: 15px;
    }

    .menu-btn, .close-btn {
      display: block; 
    }

    .system-status {
      margin-left: auto; 
    }

    .user-message, .ai-message {
      max-width: 85%; 
    }

    .input-area {
      padding: 12px; 
      padding-bottom: 20px; /* মোবাইলের নিচে একটু গ্যাপ দেওয়া হলো */
    }

    .chat-watermark img {
      width: 260px; /* মোবাইলে লোগো সাইজ পারফেক্ট করা হলো */
    }
  }
</style>
</head>

<body>

<div class="main-layout">
  
  <div class="history-sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>History</h3>
      <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>
    <div id="history-list"></div>
    <button id="clear-history">Clear History</button>
  </div>

  <div class="chat-container">

    <header>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h2>Skarl AI</h2>
      <div class="system-status" id="status-tag">SYSTEM READY</div>
    </header>

    <div class="chat-watermark">
      <img src="logo.png" alt="Skarl Logo">
    </div>

    <div id="chat"></div>

    <div class="input-area">
      <input id="message" placeholder="Ask something...">
      <!-- এখানে কীবোর্ড বারবার খোলার সমস্যার একটি কুইক ফিক্স দেওয়া হয়েছে -->
      <button class="send-btn" onclick="sendMessage(); document.getElementById('message').blur();">Send</button>
    </div>

  </div>
</div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('open');
  }
</script>

<script src="script.js"></script>

</body>
</html>
