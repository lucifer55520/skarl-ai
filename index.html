<!DOCTYPE html>
<html>
<head>
<title>Skarl AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background-color: #0f172a; 
    background-image: 
      linear-gradient(rgba(45, 57, 75, 0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45, 56, 70, 0.5) 1px, transparent 1px);
    background-size: 20px 20px; 
    display: flex; 
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #115ab3; 
  }

  .main-layout { 
    display: grid;
    grid-template-columns: 250px 1fr; 
    width: 90vw;
    max-width: 1200px;
    height: 85vh;
    background: #edeff5; 
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    border: 1px solid #e2e9f4;
  }

  /* Overlay for mobile sidebar */
  .sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(2px);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .history-sidebar {
    background-color: #252429; 
    color: #cbd5e1; 
    padding: 16px;
    border-right: 1px solid #eff1f4;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .sidebar-header h3 {
    margin: 0;
    color: white;
    font-size: 1rem;
  }

  #history-list {
    flex-grow: 1; 
  }

  .chat-container {
    background: linear-gradient(135deg, #6fbdee 0%, #d6e3f4 100%); 
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative; 
  }

  header {
    padding: 16px;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(to right, #1e293b 0%, #334155 100%); 
    color: rgb(151, 71, 71);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10; 
  }

  .menu-btn, .close-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
  }

  .close-btn {
    font-size: 1.2rem;
    color: #cbd5e1;
  }

  .system-status {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid rgba(74, 222, 128, 0.3);
  }

  header h2 {
    color: white; 
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }

  .history-item {
    padding: 8px 10px;
    margin-bottom: 8px;
    background-color: #1a84b5;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background-color 0.2s, border 0.2s;
    border: 1px solid transparent; 
  }

  .history-item:hover {
    background-color: #e5e9ef;
  }

  .history-item.active {
    background-color: #649b06;
    border: 1px solid #64748b; 
  }

  #clear-history {
    width: 100%;
    padding: 8px;
    margin-top: 15px;
    background-color: #dc2626; 
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  #clear-history:hover {
    background-color: #b91c1c;
  }

  /* Watermark CSS */
  .chat-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0; 
    pointer-events: none; 
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .chat-watermark img {
    width: 320px; 
    mix-blend-mode: multiply; 
    opacity: 0.7; 
  }

  #chat {
    flex-grow: 1;
    padding: 24px;
    overflow-y: auto;
    background-color: transparent; 
    position: relative;
    z-index: 1; 
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: #d1d5db transparent;
  }

  .input-area {
    padding: 20px;
    background: #ffffff;
    border-top: 1px solid #e5e7eb;
    display: flex; 
    gap: 12px;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  #message {
    flex-grow: 1;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 24px;
    outline: none;
    font-size: 0.95rem; 
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  }

  #message:focus {
    border-color: #4659e8; 
    box-shadow: 0 0 0 3px rgba(232, 218, 232, 0.941); 
  }

  button.send-btn {
    padding: 10px 24px;
    background-color: #581ce6;
    background: linear-gradient(135deg, #6737d8 0%, #b8bcc1 100%); 
    color: white;
    border: none;
    border-radius: 24px; 
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.2s;
  }

  button.send-btn:hover {
    background-color: #1d4ed8;
    box-shadow: 0 4px 8px rgba(243, 238, 238, 0.938); 
  }

  .message-wrapper {
    display: flex;
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .user-message {
    background: linear-gradient(135deg, #6737d8 0%, #b8bcc1 100%); 
    color: white;
    padding: 12px 16px;
    border-radius: 18px 18px 4px 18px;
    margin-left: auto;
    max-width: 70%;
    word-wrap: break-word;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15); 
  }

  .ai-message {
    background-color: #f0f4f8; 
    color: #333; 
    padding: 12px 16px;
    border-radius: 18px 18px 18px 4px;
    margin-right: auto;
    max-width: 75%;
    word-wrap: break-word;
    border: 1px solid #e0e7ff; 
  }

  .typing-indicator {
    background-color: #e0e0e0; 
    color: #555;
    display: flex;
    align-items: center;
    gap: 4px;
    width: fit-content; 
    padding: 12px 16px; 
    border-radius: 18px 18px 18px 4px; 
    margin-right: auto; 
    box-shadow: none; 
    border: 1px solid #d1d5db; 
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    background-color: #888;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
  }

  .typing-indicator span:nth-child(1) {
    animation-delay: -0.32s;
  }

  .typing-indicator span:nth-child(2) {
    animation-delay: -0.16s;
  }

  @keyframes bounce {
    0%, 80%, 100% {
      transform: scale(0);
      opacity: 0.7;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }

  @media (max-width: 768px) {
    body {
      align-items: flex-start; 
    }
    
    .main-layout {
      display: flex; 
      width: 100%; 
      height: 100dvh; 
      border-radius: 0; 
      border: none;
      position: relative;
      overflow: hidden; 
    }

    .history-sidebar {
      position: absolute;
      left: -280px; 
      top: 0;
      height: 100%;
      width: 260px;
      z-index: 1000; 
      transition: left 0.3s ease; 
      box-shadow: 4px 0 15px rgba(236, 230, 230, 0.963);
      border-right: none;
      max-height: 100%;
    }

    .sidebar-overlay.active {
      display: block;
      opacity: 1;
    }

    .history-sidebar.open {
      left: 0; 
    }

    .chat-container {
      width: 100%;
    }

    #chat {
      padding: 16px;
      gap: 12px;
    }

    header {
      justify-content: flex-start; 
      gap: 15px;
    }

    .menu-btn, .close-btn {
      display: block; 
    }

    .system-status {
      margin-left: auto; 
    }

    .user-message, .ai-message {
      max-width: 85%; 
    }

    .input-area {
      padding: 12px;
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }

    .chat-watermark img {
      width: 200px;
    }
  }
</style>
</head>

<body>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="main-layout">
  
  <!-- Sidebar -->
  <div class="history-sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>History</h3>
      <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>
    <div id="history-list">
      <!-- History items will be loaded here -->
    </div>
    <button id="clear-history">Clear History</button>
  </div>

  <!-- Chat Area -->
  <div class="chat-container">

    <header>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h2>Skarl AI</h2>
      <div class="system-status" id="status-tag">SYSTEM READY</div>
    </header>

    <!-- Watermark Logo -->
    <div class="chat-watermark">
      <img src="logo.png" alt="Skarl Logo">
    </div>

    <div id="chat">
    </div>

    <div class="input-area">
      <input id="message" placeholder="Ask something...">
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  }
</script>

<script src="script.js"></script>

</body>
</html>
