<!DOCTYPE html>
<html>
<head>
<title>Skarl AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="description" content="Skarl AI - Advanced Personal AI Assistant created by Sayak Biswas and  Surya Biswas.">
<meta name="keywords" content="Skarl AI, Skarl, AI Chatbot, Artificial Intelligence, Sayak Biswas, Surya Biswas, Skarl.sbs">
<meta name="author" content="Sayak Biswas, Surya Biswas">

<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #0f172a; 
    background-image: 
      linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
    background-size: 20px 20px; 
    display: flex; 
    justify-content: center;
    align-items: center;
    height: 100dvh; 
    overflow: hidden; 
    color: #cbd5e1; 
  }

  .main-layout { 
    display: grid;
    grid-template-columns: 250px 1fr; 
    width: 90vw;
    max-width: 1200px;
    height: 85vh;
    background: #1a202c; 
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    border: 1px solid #334155;
  }

  .history-sidebar {
    background-color: #1e293b; 
    color: #cbd5e1; 
    padding: 16px;
    border-right: 1px solid #334155;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .sidebar-header h3 {
    margin: 0;
    color: white;
    font-size: 1rem;
  }

  /* 🌟 New Chat Button Styling */
  #new-chat-btn {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    background: linear-gradient(135deg, #6a11cb, #2563eb);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  #new-chat-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(106, 17, 203, 0.3);
  }

  #history-list {
    flex-grow: 1; 
    overflow-y: auto;
  }

  .history-item {
    padding: 12px 15px; 
    margin-bottom: 15px; 
    background-color: #334155;
    color: #ffffff; 
    font-weight: 600; 
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem; 
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background-color 0.2s, border 0.2s;
    border: 1px solid transparent; 
  }

  .history-item:hover {
    background-color: #475569;
  }

  .history-item.active {
    background-color: #475569;
    border: 1px solid #64748b; 
  }

  #clear-history {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background-color: rgba(239, 68, 68, 0.1); 
    color: #ef4444; 
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  #clear-history:hover {
    background-color: rgba(239, 68, 68, 0.2);
  }

  .chat-container {
    background: #a5d7f5; 
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative; 
    width: 100%;
    height: 100%;
  }

  header {
    padding: 16px;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(to right, #1e293b 0%, #334155 100%); 
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10; 
  }

  .menu-btn, .close-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
  }

  .close-btn {
    font-size: 1.2rem;
    color: #cbd5e1;
  }

  .system-status {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid rgba(74, 222, 128, 0.3);
  }

  header h2 {
    color: white; 
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }

  .chat-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0; 
    pointer-events: none; 
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  .chat-watermark img {
    width: 350px; 
    mix-blend-mode: darken; 
    opacity: 0.35; 
  }

  #chat {
    flex-grow: 1;
    padding: 24px;
    overflow-y: auto;
    background-color: transparent; 
    position: relative;
    z-index: 1; 
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: #d1d5db transparent;
  }
  
  /* 🌟 Image Preview Styling */
  .preview-container {
    display: none;
    padding: 10px 20px;
    background: #f8fafc;
    border-top: 1px solid #e5e7eb;
    position: relative;
    z-index: 10;
  }
  
  .preview-box {
    position: relative;
    display: inline-block;
  }
  
  .preview-box img {
    height: 60px;
    border-radius: 8px;
    border: 2px solid #cbd5e1;
  }
  
  .remove-img-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .input-area {
    padding: 16px 20px;
    background: #ffffff; 
    border-top: 1px solid #e5e7eb;
    display: flex; 
    gap: 12px;
    align-items: center;
    position: relative;
    z-index: 10;
  }
  
  /* 🌟 Upload Button Styling */
  .upload-btn {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #cbd5e1;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 1.2rem;
    transition: background 0.2s;
  }

  .upload-btn:hover {
    background: #e2e8f0;
  }

  #message {
    flex-grow: 1;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 24px;
    outline: none;
    font-size: 0.95rem; 
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  }

  #message:focus {
    border-color: #6a11cb; 
    box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.2); 
  }

  button.send-btn {
    padding: 10px 24px;
    background-color: #6a11cb; 
    color: white;
    border: none;
    border-radius: 24px; 
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.2s;
  }

  button.send-btn:hover {
    background-color: #1d4ed8;
  }

  .message-wrapper {
    display: flex;
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .user-message {
    background: linear-gradient(135deg, #8b33ff, #5b0bb5); 
    color: white;
    padding: 12px 18px;
    border-radius: 24px 24px 4px 24px;
    margin-left: auto;
    max-width: 75%;
    word-wrap: break-word;
    box-shadow: 0 4px 8px rgba(106, 17, 203, 0.2); 
    font-weight: 500;
  }

  .ai-message {
    background-color: #faebd7; 
    color: #333333; 
    padding: 16px 20px;
    border-radius: 16px 16px 16px 4px;
    margin-right: auto;
    max-width: 85%; 
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); 
    border: 1px solid rgba(0, 0, 0, 0.02);
    line-height: 1.5;
  }
  
  /* 🌟 চ্যাটে ছবি দেখানোর স্টাইল */
  .user-img-msg {
    max-width: 200px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: block;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(3px);
    display: none; 
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .modal-overlay.active {
    display: flex;
    animation: fadeInModal 0.2s ease-out forwards;
  }

  .modal-box {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 24px;
    width: 90%;
    max-width: 320px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    text-align: center;
    color: #e2e8f0;
    transform: scale(0.9);
    animation: popIn 0.2s ease-out forwards;
  }

  .modal-box h3 {
    margin: 0 0 10px 0;
    color: #f8fafc;
    font-size: 1.25rem;
  }

  .modal-box p {
    font-size: 0.9rem;
    color: #94a3b8;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
  }

  .modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-cancel {
    background: #334155;
    color: #cbd5e1;
  }

  .btn-cancel:hover {
    background: #475569;
  }

  .btn-delete {
    background: #ef4444;
    color: white;
  }

  .btn-delete:hover {
    background: #dc2626;
  }

  @keyframes fadeInModal {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes popIn {
    from { transform: scale(0.9); }
    to { transform: scale(1); }
  }

  @media (max-width: 768px) {
    body {
      align-items: flex-start; 
    }

    .main-layout {
      display: flex; 
      width: 100%; 
      height: 100dvh; 
      border-radius: 0; 
      border: none;
      position: relative;
    }

    .history-sidebar {
      position: absolute;
      left: -280px; 
      top: 0;
      height: 100%;
      width: 260px;
      z-index: 1000; 
      transition: left 0.3s ease; 
      box-shadow: 4px 0 15px rgba(0,0,0,0.5);
      border-right: none;
    }

    .history-sidebar.open {
      left: 0; 
    }

    header {
      justify-content: flex-start; 
      gap: 15px;
    }

    .menu-btn, .close-btn {
      display: block; 
    }

    .system-status {
      margin-left: auto; 
    }

    .user-message, .ai-message {
      max-width: 90%; 
    }

    .input-area {
      padding: 12px; 
      padding-bottom: 20px; 
    }

    .chat-watermark img {
      width: 260px; 
    }
  }
</style>
</head>

<body>

<div class="main-layout">

  <div class="history-sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>History</h3>
      <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>

    <div style="width: 100%; display: block; clear: both; position: relative; z-index: 1010;">
      <button id="new-chat-btn" onclick="startNewChat()">➕ New Chat</button>
    </div>

    <div id="history-list"></div>
    <button id="clear-history">🗑️ Clear History</button>
  </div>

  <div class="chat-container">

    <header>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h2>Skarl AI</h2>
      <div class="system-status" id="status-tag">SYSTEM READY</div>
    </header>

    <div class="chat-watermark">
      <img src="logo.png" alt="Skarl Logo">
    </div>

    <div id="chat"></div>
    
    <div class="preview-container" id="preview-container">
      <div class="preview-box">
        <img id="image-preview" src="" alt="Selected Image">
        <button class="remove-img-btn" onclick="removeImage()">✖</button>
      </div>
    </div>

    <div class="input-area">
      <button class="upload-btn" onclick="document.getElementById('image-upload').click()">📎</button>
      <input type="file" id="image-upload" accept="image/*" style="display: none;">
      
      <input id="message" placeholder="Ask something...">
      <button class="send-btn" onclick="sendMessage(); document.getElementById('message').blur();">Send</button>
    </div>

  </div>
</div>

<div id="custom-confirm" class="modal-overlay">
  <div class="modal-box">
    <h3>Clear History?</h3>
    <p>Are you sure you want to delete all conversations? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-delete" onclick="confirmClear()">Delete</button>
    </div>
  </div>
</div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('open');
  }

  function closeModal() {
    document.getElementById('custom-confirm').classList.remove('active');
  }
</script>

<script src="script.js"></script>

</body>
</html>
