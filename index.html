<!DOCTYPE html>
<html>
<head>
<title>Skarl AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background-color: #0f172a; 
    background-image: 
      linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
    background-size: 20px 20px; 
    display: flex; 
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #cbd5e1; 
  }

  .main-layout { 
    display: grid;
    grid-template-columns: 250px 1fr; 
    width: 90vw;
    max-width: 1200px;
    height: 85vh;
    background: #1a202c; 
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    border: 1px solid #334155;
  }

  .history-sidebar {
    background-color: #1e293b; 
    color: #cbd5e1; 
    padding: 16px;
    border-right: 1px solid #334155;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .sidebar-header h3 {
    margin: 0;
    color: white;
    font-size: 1rem;
  }

  #history-list {
    flex-grow: 1; 
  }

  .chat-container {
    background: white;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(to right, #1e293b 0%, #334155 100%); 
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* ডেস্কটপে মেনু বাটন হাইড করা থাকবে */
  .menu-btn, .close-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
  }

  .close-btn {
    font-size: 1.2rem;
    color: #cbd5e1;
  }

  .system-status {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid rgba(74, 222, 128, 0.3);
  }

  header h2 {
    color: white; 
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }

  .history-item {
    padding: 8px 10px;
    margin-bottom: 8px;
    background-color: #334155;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background-color 0.2s, border 0.2s;
    border: 1px solid transparent; 
  }

  .history-item:hover {
    background-color: #475569;
  }

  .history-item.active {
    background-color: #475569;
    border: 1px solid #64748b; 
  }

  #clear-history {
    width: 100%;
    padding: 8px;
    margin-top: 15px;
    background-color: #dc2626; 
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  #clear-history:hover {
    background-color: #b91c1c;
  }

  #chat {
    flex-grow: 1;
    padding: 24px;
    overflow-y: auto;
    background-color: #fdfdfd; 
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: #d1d5db transparent;
  }

  .input-area {
    padding: 20px;
    background: #ffffff;
    border-top: 1px solid #e5e7eb;
    display: flex; 
    gap: 12px;
    align-items: center;
  }

  #message {
    flex-grow: 1;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 24px;
    outline: none;
    font-size: 0.95rem; 
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  }

  #message:focus {
    border-color: #6a11cb; 
    box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.2); 
  }

  button.send-btn {
    padding: 10px 24px;
    background-color: #6a11cb; 
    color: white;
    border: none;
    border-radius: 24px; 
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.2s;
  }

  button.send-btn:hover {
    background-color: #1d4ed8;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); 
  }

  .message-wrapper {
    display: flex;
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .user-message {
    background-color: #2575fc; 
    color: white;
    padding: 12px 16px;
    border-radius: 18px 18px 4px 18px;
    margin-left: auto;
    max-width: 70%;
    word-wrap: break-word;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15); 
  }

  .ai-message {
    background-color: #f0f4f8; 
    color: #333; 
    padding: 12px 16px;
    border-radius: 18px 18px 18px 4px;
    margin-right: auto;
    max-width: 75%;
    word-wrap: break-word;
    border: 1px solid #e0e7ff; 
  }

  /* ========================================= */
  /* 📱 MOBILE GEMINI STYLE (নতুন আপডেট) */
  /* ========================================= */
  @media (max-width: 768px) {
    body {
      align-items: flex-start; 
    }
    
    .main-layout {
      display: flex; /* গ্রিড সরিয়ে ফ্লেক্স করা হলো */
      width: 100vw; 
      height: 100vh; 
      border-radius: 0; 
      border: none;
      position: relative;
      overflow: hidden; /* স্ক্রল আটকানোর জন্য */
    }

    .history-sidebar {
      position: absolute;
      left: -280px; /* স্ক্রিনের বামদিকে লুকিয়ে থাকবে */
      top: 0;
      height: 100%;
      width: 260px;
      z-index: 1000; /* চ্যাটের ওপরে ভাসবে */
      transition: left 0.3s ease; /* স্মুথ স্লাইড অ্যানিমেশন */
      box-shadow: 4px 0 15px rgba(0,0,0,0.5);
      border-right: none;
      max-height: 100%;
    }

    /* জাভাস্ক্রিপ্ট দিয়ে এই ক্লাসটি যোগ হলে মেনু বেরিয়ে আসবে */
    .history-sidebar.open {
      left: 0; 
    }

    .chat-container {
      width: 100%;
    }

    header {
      justify-content: flex-start; /* মেনু বাটন বামে রাখার জন্য */
      gap: 15px;
    }

    /* মোবাইলে মেনু বাটনগুলো দৃশ্যমান হবে */
    .menu-btn, .close-btn {
      display: block; 
    }

    .system-status {
      margin-left: auto; /* স্ট্যাটাস ডানদিকে ঠেলে দেওয়া হলো */
    }

    .user-message, .ai-message {
      max-width: 85%; 
    }

    .input-area {
      padding: 12px; 
    }
  }
</style>
</head>

<body>

<div class="main-layout">
  
  <div class="history-sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>History</h3>
      <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>
    <div id="history-list">
      </div>
    <button id="clear-history">Clear History</button>
  </div>

  <div class="chat-container">

    <header>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h2>Sky AI</h2>
      <div class="system-status" id="status-tag">SYSTEM READY</div>
    </header>

    <div id="chat">
    </div>

    <div class="input-area">
      <input id="message" placeholder="Ask something...">
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('open');
  }
</script>

<script src="script.js"></script>

</body>
</html>
