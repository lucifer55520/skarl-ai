<!DOCTYPE html>
<html>
<head>
<title>Skarl AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="description" content="Skarl AI - Advanced Personal AI Assistant created by Surya Biswas and co-founded by Sayak Biswas.">
<meta name="keywords" content="Skarl AI, Skarl, AI Chatbot, Artificial Intelligence, Surya Biswas, Sayak Biswas, Skarl.sbs">
<meta name="author" content="Surya Biswas, Sayak Biswas">

<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #0f172a; 
    background-image: 
      linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
    background-size: 20px 20px; 
    display: flex; 
    justify-content: center;
    align-items: center;
    height: 100dvh; 
    overflow: hidden; 
    color: #cbd5e1; 
  }

  .main-layout { 
    display: grid;
    grid-template-columns: 250px 1fr; 
    width: 90vw;
    max-width: 1200px;
    height: 85vh;
    background: #1a202c; 
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    border: 1px solid #334155;
  }

  .history-sidebar {
    background-color: #1e293b; 
    color: #cbd5e1; 
    padding: 16px;
    border-right: 1px solid #334155;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .sidebar-header h3 {
    margin: 0;
    color: white;
    font-size: 1rem;
  }

  /* 🌟 New Chat Button Styling */
  #new-chat-btn {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    background: linear-gradient(135deg, #6a11cb, #2563eb);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  #new-chat-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(106, 17, 203, 0.3);
  }

  #history-list {
    flex-grow: 1; 
    overflow-y: auto;
  }

  .history-item {
    padding: 12px 15px; 
    margin-bottom: 15px; 
    background-color: #334155;
    color: #ffffff; 
    font-weight: 600; 
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem; 
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background-color 0.2s, border 0.2s;
    border: 1px solid transparent; 
  }

  .history-item:hover {
    background-color: #475569;
  }

  .history-item.active {
    background-color: #475569;
    border: 1px solid #64748b; 
  }

  #clear-history {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background-color: rgba(239, 68, 68, 0.1); 
    color: #ef4444; 
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  #clear-history:hover {
    background-color: rgba(239, 68, 68, 0.2);
  }

  .chat-container {
    background: #a5d7f5; 
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative; 
    width: 100%;
    height: 100%;
  }

  header {
    padding: 16px;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(to right, #1e293b 0%, #334155 100%); 
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10; 
  }

  .menu-btn, .close-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
  }

  .close-btn {
    font-size: 1.2rem;
    color: #cbd5e1;
  }

  .system-status {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
