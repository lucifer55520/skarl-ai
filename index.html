<!DOCTYPE html>
<html>
<head>
<title>Skarl AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Skarl AI - Advanced Personal AI Assistant created by Sayak Biswas and Surya Biswas.">
<meta name="keywords" content="Skarl AI, Skarl, AI Chatbot, Artificial Intelligence, Sayak Biswas, Surya Biswas">
<meta name="author" content="Sayak Biswas, Surya Biswas">

<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: #ffffff; 
    display: flex; 
    justify-content: center;
    align-items: center;
    height: 100dvh; 
    overflow: hidden; 
    color: #333333; 
  }

  .main-layout { 
    display: grid;
    grid-template-columns: 260px 1fr; 
    width: 100vw;
    max-width: 100%;
    height: 100dvh;
    background: #ffffff; 
    overflow: hidden;
  }

  /* 🌟 Light Sidebar */
  .history-sidebar {
    background-color: #f9f9f9; 
    color: #333333; 
    padding: 20px 16px;
    border-right: 1px solid #e5e5e5;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .sidebar-header h3 {
    margin: 0;
    color: #111111;
    font-size: 1.1rem;
    font-weight: 600;
  }

  #new-chat-btn {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    background: #ffffff;
    color: #333333;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    font-size: 0.95rem;
    transition: all 0.2s;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  #new-chat-btn:hover {
    background: #f3f4f6;
  }

  #history-list {
    flex-grow: 1; 
    overflow-y: auto;
  }

  .history-item {
    padding: 12px 15px; 
    margin-bottom: 8px; 
    background-color: transparent;
    color: #4b5563; 
    font-weight: 500; 
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem; 
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background-color 0.2s;
  }

  .history-item:hover {
    background-color: #e5e7eb;
    color: #111111;
  }

  .history-item.active {
    background-color: #e5e7eb;
    color: #111111;
    font-weight: 600;
  }

  #clear-history {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background-color: transparent; 
    color: #ef4444; 
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    font-size: 0.95rem;
    transition: all 0.2s;
  }

  #clear-history:hover {
    background-color: #fee2e2;
  }

  /* 🌟 Clean Chat Container */
  .chat-container {
    background: #ffffff; 
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative; 
    width: 100%;
    height: 100%;
  }

  header {
    padding: 16px 24px;
    background: #ffffff; 
    border-bottom: 1px solid #e5e5e5;
    color: #111111;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10; 
  }

  .menu-btn {
    display: none;
    background: none;
    border: none;
    color: #333333;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
  }

  header h2 {
    color: #111111; 
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .system-status {
    font-size: 0.75rem;
    font-family: monospace;
    background: #f0fdf4;
    color: #16a34a;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid #bbf7d0;
  }

  #user-profile-icon {
    font-size: 0.95rem;
    font-weight: 600;
    color: #ffffff;
    cursor: pointer;
    background: #6a11cb; 
    width: 36px;
    height: 36px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    user-select: none;
  }

  #profile-dropdown {
    position: absolute;
    top: 60px;
    right: 24px;
    background: #ffffff;
    color: #333333;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
    z-index: 1000;
    min-width: 220px;
    border: 1px solid #e5e7eb;
  }

  #profile-dropdown h4 { margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; }
  #profile-dropdown p { font-size: 0.85rem; margin-bottom: 8px; color: #4b5563; }
  .logout-btn { width: 100%; padding: 8px; margin-top: 10px; background: #fee2e2; color: #ef4444; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
  .hidden { display: none !important; }

  #login-modal {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(5px);
    z-index: 10000;
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex; justify-content: center; align-items: center;
  }

  .login-box {
    background: #ffffff;
    padding: 40px 30px;
    border-radius: 16px;
    text-align: center;
    color: #333;
    width: 90%; max-width: 360px;
    box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.1);
    border: 1px solid #e5e7eb;
  }

  .login-box h2 { margin-bottom: 24px; color: #111; }
  .login-box input {
    width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px;
    border: 1px solid #d1d5db; background: #f9fafb; outline: none; font-size: 1rem;
  }
  .login-box input:focus { border-color: #6a11cb; background: #ffffff; }
  .login-box button {
    width: 100%; padding: 14px; margin-top: 5px; background: #6a11cb; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem;
  }

  #chat {
    flex-grow: 1;
    padding: 24px;
    overflow-y: auto;
    background-color: transparent; 
    display: flex;
    flex-direction: column;
    gap: 24px;
    scrollbar-width: thin;
  }

  /* 🌟 Input Area Update (Like Screenshot) */
  .input-area {
    padding: 20px 24px;
    background: #ffffff; 
    display: flex; 
    gap: 12px;
    align-items: center;
  }

  .upload-btn {
    background: transparent;
    color: #6b7280;
    border: none;
    border-radius: 50%;
    width: 44px; height: 44px;
    display: flex; justify-content: center; align-items: center;
    cursor: pointer; font-size: 1.4rem;
  }

  .upload-btn:hover { background: #f3f4f6; color: #111; }

  #message {
    flex-grow: 1;
    padding: 16px 24px;
    background: #f4f4f5; /* Light Pill shape */
    border: none;
    border-radius: 30px;
    outline: none;
    font-size: 1rem; 
    color: #111;
  }

  #message::placeholder { color: #9ca3af; }

  button.send-btn {
    background: transparent;
    color: #2563eb; 
    border: none;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.2rem;
    padding: 10px;
  }

  .message-wrapper { display: flex; width: 100%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .user-message {
    background: #f3f4f6; 
    color: #111111;
    padding: 14px 20px;
    border-radius: 20px 20px 4px 20px;
    margin-left: auto;
    max-width: 75%;
    font-weight: 400;
  }

  .ai-message {
    background-color: transparent; 
    color: #111111; 
    padding: 14px 0px;
    margin-right: auto;
    max-width: 85%; 
    line-height: 1.6;
  }

  .user-img-msg { max-width: 200px; border-radius: 8px; margin-bottom: 8px; display: block; }

  /* 🌟 Custom Alert Modal Styles for Light Theme */
  #custom-confirm .modal-box {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    color: #333333;
    box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.1);
  }
  
  #custom-confirm .modal-box h3 { color: #111111; }
  #custom-confirm .modal-box p { color: #4b5563; }
  
  #custom-confirm .btn-cancel { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db;}
  #custom-confirm .btn-cancel:hover { background: #e5e7eb; }

  @media (max-width: 768px) {
    .main-layout { display: flex; position: relative; }
    .history-sidebar {
      position: absolute; left: -280px; top: 0; height: 100%; width: 280px;
      z-index: 1000; transition: left 0.3s ease; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
    }
    .history-sidebar.open { left: 0; }
    header { justify-content: flex-start; gap: 15px; padding: 12px 16px; }
    .menu-btn { display: block; }
    .header-right { margin-left: auto; }
    .input-area { padding: 12px 16px; padding-bottom: 20px; }
  }
</style>
</head>

<body>

<div class="main-layout">
  <div class="history-sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>History</h3>
    </div>
    <button id="new-chat-btn" onclick="startNewChat()">➕ New Chat</button>
    <div id="history-list"></div>
    <button id="clear-history">🗑️ Clear History</button>
  </div>

  <div class="chat-container">
    <header>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h2>Skarl AI</h2>
      <div class="header-right">
        <div class="system-status" id="system-ready-badge">READY</div>
        <div id="user-profile-icon" style="display: none;" onclick="toggleProfile()"></div>
        <div id="profile-dropdown" class="hidden">
            <h4>User Credentials</h4>
            <p><strong>Username:</strong> <span id="disp-user"></span></p>
            <p><strong>Password:</strong> <span id="disp-pass"></span></p>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
    </header>

    <div id="chat"></div>

    <div class="input-area">
      <button class="upload-btn" onclick="document.getElementById('image-upload').click()">📎</button>
      <input type="file" id="image-upload" accept="image/*" style="display: none;">
      <input id="message" placeholder="Ask anything...">
      <button class="send-btn" onclick="sendMessage(); document.getElementById('message').blur();">➤</button>
    </div>
  </div>
</div>

<div id="login-modal" class="modal-overlay">
  <div class="login-box">
    <h2>Skarl AI Login</h2>
    <input type="text" id="login-user" placeholder="Enter Username" required>
    <input type="password" id="login-pass" placeholder="Enter Password" required>
    <button onclick="handleLogin()">Login to System</button>
  </div>
</div>

<div id="custom-confirm" class="modal-overlay">
  <div class="modal-box">
    <h3>Clear History?</h3>
    <p>Are you sure you want to delete all conversations? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-delete" onclick="confirmClear()">Delete</button>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
