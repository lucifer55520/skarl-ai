<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skarl AI - Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            /* 🌟 আপনার ব্যাকগ্রাউন্ড ইমেজ */
            background: url('Background.png') center/cover no-repeat; 
            background-color: #d1d5db; 
        }

        /* 🌟 Glassmorphism Card (ছোট এবং কম্প্যাক্ট সাইজ) */
        .login-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 35px 25px; 
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
        }

        /* 🌟 Text এর বদলে Image Logo এর ডিজাইন */
        .logo-img { 
            width: 150px; 
            height: auto; 
            display: block; 
            margin: 0 auto 5px auto; 
            mix-blend-mode: multiply; /* সাদা ব্যাকগ্রাউন্ড স্বচ্ছ করে দেবে */
            filter: contrast(1.2); 
        }

        .subtitle { font-size: 0.75rem; font-weight: 600; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; }
        
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; top: 50%; left: 16px; transform: translateY(-50%); color: #6b7280; font-size: 1rem; }
        .input-group input { width: 100%; padding: 12px 45px; border-radius: 12px; border: none; outline: none; background: rgba(255, 255, 255, 0.9); font-size: 0.95rem; color: #111; transition: all 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .input-group input:focus { background: #ffffff; box-shadow: 0 0 0 2px #111; }
        
        .toggle-password { position: absolute; top: 50%; right: 16px; left: auto !important; cursor: pointer; color: #6b7280; }
        
        .btn-login { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #111; color: white; font-size: 1rem; font-weight: 500; cursor: pointer; margin-top: 5px; transition: 0.3s; }
        .btn-login:hover { background: #333; transform: translateY(-2px); }
        
        .divider { display: flex; align-items: center; margin: 15px 0; color: #6b7280; font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0, 0, 0, 0.1); }
        .divider span { padding: 0 10px; }
        
        .btn-google { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #ffffff; color: #111; font-size: 0.95rem; font-weight: 500; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .btn-google:hover { background: #f9fafb; transform: translateY(-2px); }
        .btn-google img { width: 18px; }
        
        .footer-text { margin-top: 20px; font-size: 0.85rem; color: #4b5563; }
        .footer-text a { color: #111; font-weight: 600; text-decoration: none; cursor: pointer; }
        .footer-text a:hover { text-decoration: underline; }
        
        #error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; font-weight: 500; }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- 🌟 টেক্সটের বদলে আপনার আসল লোগোর ছবিটি এখানে দেওয়া হয়েছে -->
        <img src="logo.png" alt="Skarl Logo" class="logo-img">
        <p class="subtitle">AI Assistant</p>

        <div class="input-group">
            <i class="fa-regular fa-user"></i>
            <input type="email" id="email" placeholder="Email or username" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
            <i class="fa-regular fa-eye toggle-password" id="togglePassword" onclick="togglePass()"></i>
        </div>

        <button class="btn-login" onclick="processLogin()">Login</button>
        <p id="error-msg"></p>

        <div class="divider"><span>OR</span></div>

        <button class="btn-google" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Continue with Google
        </button>

        <p class="footer-text">Don't have an account? <a onclick="processLogin()">Sign up</a></p>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('togglePassword');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="auth.js"></script>

</body>
</html>
